name: Deploy Micontrol

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/micontrol-backend:latest ./saas-backend
          docker push ghcr.io/${{ github.repository_owner }}/micontrol-backend:latest

      - name: Build frontend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/micontrol-frontend:latest ./saas-frontend
          docker push ghcr.io/${{ github.repository_owner }}/micontrol-frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ferchecosolutions-dockge/htdocs/dockge.ferchecosolutions.com/dockge-stacks/micontrol
            docker compose pull
            docker compose up -d